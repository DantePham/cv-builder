<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CV Builder - Elegant Template</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            background: #f5f5f5;
        }
        .template-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            align-items: start;
        }
        .form-container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            position: sticky;
            top: 20px;
            max-height: 90vh;
            overflow-y: auto;
        }
        .preview-container {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .back-btn {
            background: #e0e0e0;
            color: #333;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }
        .back-btn:hover {
            background: #d0d0d0;
        }
        @media (max-width: 1024px) {
            .template-container {
                grid-template-columns: 1fr;
            }
            .form-container {
                position: static;
                max-height: none;
            }
        }
    </style>
</head>
<body>
    <div class="template-container">
        <div class="form-container">
            <div class="header-actions">
                <a href="index.html" class="back-btn">← Chọn Template Khác</a>
                <button class="btn-primary" onclick="exportPDF()">📥 Xuất PDF</button>
            </div>
            
            <h2 style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 20px;">Template: Elegant</h2>
            
            <form id="cvForm">
                <div class="form-section">
                    <h3>📋 Thông Tin Cá Nhân</h3>
                    <div class="form-grid">
                        <input type="text" id="fullName" placeholder="Họ và tên *" required>
                        <input type="text" id="title" placeholder="Chức danh *" required>
                        <input type="email" id="email" placeholder="Email *" required>
                        <input type="tel" id="phone" placeholder="Số điện thoại *" required>
                        <input type="text" id="address" placeholder="Địa chỉ">
                    </div>
                </div>

                <div class="form-section">
                    <h3>🎯 Mục Tiêu</h3>
                    <textarea id="objective" placeholder="Mục tiêu nghề nghiệp" rows="3"></textarea>
                </div>

                <div class="form-section">
                    <h3>💼 Kinh Nghiệm</h3>
                    <div id="experienceList"></div>
                    <button type="button" class="btn-add" onclick="addExperience()">+ Thêm Kinh Nghiệm</button>
                </div>

                <div class="form-section">
                    <h3>🎓 Học Vấn</h3>
                    <div id="educationList"></div>
                    <button type="button" class="btn-add" onclick="addEducation()">+ Thêm Học Vấn</button>
                </div>

                <div class="form-section">
                    <h3>🏆 Chứng Chỉ</h3>
                    <div id="certificationsList"></div>
                    <button type="button" class="btn-add" onclick="addCertification()">+ Thêm Chứng Chỉ</button>
                </div>

                <button type="button" class="btn-primary" style="width: 100%; margin-top: 20px;" onclick="updatePreview()">
                    🔄 Cập Nhật Preview
                </button>
            </form>
        </div>

        <div class="preview-container">
            <h3 style="margin-bottom: 20px; color: #666;">Xem Trước CV</h3>
            <div id="cvPreview" class="cv-preview"></div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script>
        const currentTemplate = 'elegant';
    </script>
    <script src="template-script.js"></script>
</body>
</html>
